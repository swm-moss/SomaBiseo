spring:
  application:
    name: SomaBiseo
  datasource:
    url: ${DATABASE_JDBC_URL:${DATABASE_URL:jdbc:postgresql://localhost:5432/somabiseo}}
    username: ${DATABASE_USERNAME:somabiseo}
    password: ${DATABASE_PASSWORD:somabiseo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:${PORT:8080}}

springdoc:
  swagger-ui:
    path: /api/docs

somabiseo:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
  portal:
    base-url: ${SOMA_PORTAL_BASE_URL:https://www.swmaestro.ai}
    login-page-path: /busan/sw/member/user/forLogin.do?menuNo=200025
    login-check-path: /busan/sw/member/user/checkStat.json
    login-submit-path: /busan/sw/member/user/toLogin.do
    notice-list-path: /busan/sw/mypage/myNotice/list.do?menuNo=200038
    event-list-path: /busan/sw/mypage/mentoLec/list.do?menuNo=200046
    mento-lec-view-path: /busan/sw/mypage/mentoLec/view.do?menuNo=200046
    mento-lec-apply-path: /busan/sw/mypage/mentoLec/apply.json
    mento-lec-cancel-path: /busan/sw/mypage/mentoLec/applyCancel.json
    operator-username: ${SOMA_PORTAL_OPERATOR_USERNAME:}
    operator-password: ${SOMA_PORTAL_OPERATOR_PASSWORD:}
    session-ttl-minutes: ${SOMA_PORTAL_SESSION_TTL_MINUTES:30}
    cache-ttl-minutes: ${SOMA_PORTAL_CACHE_TTL_MINUTES:30}
    sync-page-limit: ${SOMA_PORTAL_SYNC_PAGE_LIMIT:60}
  openai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_SUMMARY_MODEL:gpt-5.4-mini}
    max-input-characters: ${OPENAI_SUMMARY_MAX_INPUT_CHARACTERS:18000}
    timeout-seconds: ${OPENAI_TIMEOUT_SECONDS:30}
