spring:
  application:
    name: SomaBiseo
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/somabiseo}
    username: ${DATABASE_USERNAME:somabiseo}
    password: ${DATABASE_PASSWORD:somabiseo}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

springdoc:
  swagger-ui:
    path: /api/docs

somabiseo:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001}
