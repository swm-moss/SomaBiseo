services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/somabiseo
      DATABASE_USERNAME: somabiseo
      DATABASE_PASSWORD: somabiseo
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SOMA_PORTAL_OPERATOR_USERNAME: ${SOMA_PORTAL_OPERATOR_USERNAME:-}
      SOMA_PORTAL_OPERATOR_PASSWORD: ${SOMA_PORTAL_OPERATOR_PASSWORD:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.4-mini}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: somabiseo
      POSTGRES_USER: somabiseo
      POSTGRES_PASSWORD: somabiseo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somabiseo -d somabiseo"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - somabiseo-postgres:/var/lib/postgresql/data

volumes:
  somabiseo-postgres:
