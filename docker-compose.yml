services:
  backend:
    build:
      context: ./backend
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/somabiseo
      DATABASE_USERNAME: somabiseo
      DATABASE_PASSWORD: somabiseo
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3001
      SOMA_PORTAL_OPERATOR_USERNAME: ${SOMA_PORTAL_OPERATOR_USERNAME:-}
      SOMA_PORTAL_OPERATOR_PASSWORD: ${SOMA_PORTAL_OPERATOR_PASSWORD:-}
      SOMA_PORTAL_CACHE_TTL_MINUTES: ${SOMA_PORTAL_CACHE_TTL_MINUTES:-30}
      SOMA_PORTAL_SYNC_PAGE_LIMIT: ${SOMA_PORTAL_SYNC_PAGE_LIMIT:-60}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_SUMMARY_MODEL: ${OPENAI_SUMMARY_MODEL:-gpt-5.4-mini}
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CALENDAR_CLIENT_ID:-}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CALENDAR_CLIENT_SECRET:-}
      GOOGLE_CALENDAR_REDIRECT_URI: ${GOOGLE_CALENDAR_REDIRECT_URI:-http://localhost:8080/api/calendar/google/callback}
      GOOGLE_LOGIN_FRONTEND_REDIRECT_URI: ${GOOGLE_LOGIN_FRONTEND_REDIRECT_URI:-}
      GOOGLE_CALENDAR_FRONTEND_REDIRECT_URI: ${GOOGLE_CALENDAR_FRONTEND_REDIRECT_URI:-http://localhost:3000/settings}
      GOOGLE_AUTH_SESSION_TTL_MINUTES: ${GOOGLE_AUTH_SESSION_TTL_MINUTES:-43200}
      SOMABISEO_INVITE_CODE: ${SOMABISEO_INVITE_CODE:-}
      SOMABISEO_INVITE_MAX_FAILED_ATTEMPTS: ${SOMABISEO_INVITE_MAX_FAILED_ATTEMPTS:-5}
      SOMABISEO_INVITE_LOCK_MINUTES: ${SOMABISEO_INVITE_LOCK_MINUTES:-10}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-15432}:5432"
    environment:
      POSTGRES_DB: somabiseo
      POSTGRES_USER: somabiseo
      POSTGRES_PASSWORD: somabiseo
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somabiseo -d somabiseo"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - somabiseo-postgres:/var/lib/postgresql/data

volumes:
  somabiseo-postgres:
