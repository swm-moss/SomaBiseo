services:
  postgres:
    image: postgres:16
    container_name: somabiseo-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: somabiseo
      POSTGRES_USER: somabiseo
      POSTGRES_PASSWORD: somabiseo
    volumes:
      - somabiseo-postgres:/var/lib/postgresql/data

volumes:
  somabiseo-postgres:
