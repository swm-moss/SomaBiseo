name: Deploy Production

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - main
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: production-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  frontend-vercel:
    name: Frontend to Vercel
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    defaults:
      run:
        working-directory: frontend
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Vercel configuration
        run: |
          test -n "$VERCEL_TOKEN" || (echo "::error::VERCEL_TOKEN secret is required" && exit 1)
          test -n "$VERCEL_ORG_ID" || (echo "::error::VERCEL_ORG_ID secret is required" && exit 1)
          test -n "$VERCEL_PROJECT_ID" || (echo "::error::VERCEL_PROJECT_ID secret is required" && exit 1)

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build for Vercel
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel
        id: deploy
        run: |
          deployment_url="$(vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN")"
          echo "url=$deployment_url" >> "$GITHUB_OUTPUT"

  backend-railway:
    name: Backend to Railway
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE_NAME: ${{ vars.RAILWAY_SERVICE_NAME }}
      RAILWAY_ENVIRONMENT_NAME: ${{ vars.RAILWAY_ENVIRONMENT_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate Railway configuration
        run: |
          test -n "$RAILWAY_TOKEN" || (echo "::error::RAILWAY_TOKEN secret is required" && exit 1)
          test -n "$RAILWAY_PROJECT_ID" || (echo "::error::RAILWAY_PROJECT_ID variable is required" && exit 1)
          test -n "$RAILWAY_SERVICE_NAME" || (echo "::error::RAILWAY_SERVICE_NAME variable is required" && exit 1)

      - name: Install Railway CLI
        run: npm install --global @railway/cli

      - name: Deploy to Railway
        run: |
          environment_name="${RAILWAY_ENVIRONMENT_NAME:-production}"
          railway up backend \
            --path-as-root \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE_NAME" \
            --environment "$environment_name" \
            --ci \
            --message "GitHub Actions ${GITHUB_SHA}"

      - name: Show Railway logs on failure
        if: failure()
        run: |
          environment_name="${RAILWAY_ENVIRONMENT_NAME:-production}"
          railway link \
            --project "$RAILWAY_PROJECT_ID" \
            --service "$RAILWAY_SERVICE_NAME" \
            --environment "$environment_name"
          echo "## Latest deployment logs"
          railway logs --latest --deployment --lines 200 || true
          echo "## Latest runtime logs"
          railway logs --latest --lines 200 || true
